# cargo-deny configuration
#
# Supply chain security per:
#   - SLSA (OpenSSF)  https://slsa.dev/spec/
#   - OpenSSF         https://openssf.org/projects/
#   - CycloneDX/SPDX  https://cyclonedx.org / https://spdx.github.io/spdx-spec/
#
# Run locally:  cargo deny check
# Install:      cargo install cargo-deny

# ── Vulnerability advisories ──────────────────────────────────────────────────
[advisories]
db-path  = "~/.cargo/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]
version  = 2

vulnerability = "deny"
unmaintained  = "warn"
yanked        = "deny"
notice        = "warn"

# ── Licence policy ────────────────────────────────────────────────────────────
[licenses]
version     = 2
unlicensed  = "deny"
copyleft    = "warn"

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]

# ── Duplicate dependency bans ─────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "allow"     # workspace path deps use no version

# ── Source trust ──────────────────────────────────────────────────────────────
# Deny crates from unknown registries or unapproved git sources.
# This directly addresses SLSA L2 source integrity requirements.
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
