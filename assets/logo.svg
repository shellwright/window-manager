<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f111a"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>

    <!-- Accent gradient for tiles -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>

    <!-- Subtle tile glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="12" fill="url(#bg)"/>

  <!-- ── Tiling window icon (left) ─────────────────────────────────────── -->
  <!-- Icon canvas: 80×80 centred at x=56, y=40 -->

  <!-- Outer frame -->
  <rect x="16" y="28" width="80" height="104" rx="6" fill="none"
        stroke="#2e3250" stroke-width="1.5"/>

  <!-- Title bar strip -->
  <rect x="16" y="28" width="80" height="10" rx="6" fill="#2e3250"/>
  <rect x="16" y="33"  width="80" height="5" fill="#2e3250"/>

  <!-- Traffic-light dots -->
  <circle cx="24" cy="33" r="2.2" fill="#ff5f57"/>
  <circle cx="31" cy="33" r="2.2" fill="#febc2e"/>
  <circle cx="38" cy="33" r="2.2" fill="#28c840"/>

  <!-- Large primary tile (top-left) -->
  <rect x="20" y="42" width="44" height="50" rx="3"
        fill="url(#accent)" opacity="0.90" filter="url(#glow)"/>

  <!-- Stack of two smaller tiles (right column) -->
  <rect x="68" y="42" width="24" height="23" rx="3"
        fill="#5b8af5" opacity="0.70"/>
  <rect x="68" y="69" width="24" height="23" rx="3"
        fill="#7c6af7" opacity="0.70"/>

  <!-- Bottom tile spanning full width -->
  <rect x="20" y="96" width="72" height="32" rx="3"
        fill="#2e3250" stroke="#3d4270" stroke-width="1"/>

  <!-- Simulated text lines in bottom tile -->
  <rect x="25" y="103" width="38" height="3" rx="1.5" fill="#5b8af5" opacity="0.6"/>
  <rect x="25" y="110" width="26" height="3" rx="1.5" fill="#7c6af7" opacity="0.4"/>
  <rect x="25" y="117" width="32" height="3" rx="1.5" fill="#5b8af5" opacity="0.3"/>

  <!-- ── Wordmark ────────────────────────────────────────────────────────── -->
  <!-- "shellwright" in a clean geometric sans -->
  <text x="112" y="90"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace"
        font-size="36"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#e8eaf6">shellwright</text>

  <!-- Subtitle -->
  <text x="114" y="112"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace"
        font-size="11"
        font-weight="400"
        letter-spacing="3"
        fill="#7c6af7"
        opacity="0.85">WINDOW MANAGER</text>

  <!-- Accent underline beneath wordmark -->
  <line x1="112" y1="96" x2="446" y2="96"
        stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
</svg>
